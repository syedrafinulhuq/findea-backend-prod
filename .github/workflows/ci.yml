name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # prisma.config.ts reads DATABASE_URL; generate/build/tests don't connect,
      # so a dummy URL is enough to satisfy config loading.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/findea?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npx nest build

      - name: Test
        run: npm test
